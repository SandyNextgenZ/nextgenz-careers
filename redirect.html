<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Redirecting | NextGenZ.careers</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:#f8fafc;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
}

.card{

background:white;

max-width:600px;
width:100%;

padding:50px;

border-radius:24px;

text-align:center;

box-shadow:
0 10px 40px rgba(0,0,0,.08);

}

.logo{

font-size:32px;
font-weight:700;

color:#2563eb;

margin-bottom:25px;

}

.logo span{
color:#22c55e;
}

.icon{

font-size:70px;

margin-bottom:20px;

}

h1{

font-size:34px;

margin-bottom:15px;

}

p{

color:#64748b;

margin-bottom:25px;

line-height:1.7;

}

.progress-container{

width:100%;
height:14px;

background:#e5e7eb;

border-radius:50px;

overflow:hidden;

margin-bottom:25px;

}

.progress-bar{

height:100%;

width:0%;

background:linear-gradient(
90deg,
#2563eb,
#4f46e5
);

border-radius:50px;

animation:load 10s linear forwards;

}

@keyframes load{

from{
width:0%;
}

to{
width:100%;
}

}

.countdown{

font-size:22px;

font-weight:700;

color:#2563eb;

margin-bottom:20px;

}

.notice{

background:#eff6ff;

padding:18px;

border-radius:14px;

color:#1e40af;

font-size:14px;

margin-top:20px;

}

.manual-btn{

display:inline-block;

margin-top:25px;

padding:14px 28px;

background:#2563eb;

color:white;

text-decoration:none;

border-radius:12px;

font-weight:600;

transition:.3s;

}

.manual-btn:hover{

transform:translateY(-3px);

box-shadow:
0 10px 25px rgba(37,99,235,.25);

}

@media(max-width:768px){

.card{
padding:35px 25px;
}

h1{
font-size:28px;
}

}

</style>

</head>
<body>

<div class="card">

<div class="logo">
NextGenZ<span>.careers</span>
</div>

<div class="icon">
🔍
</div>

<h1>
Verifying Opportunity...
</h1>

<p>

Please wait while we verify the job opportunity
and redirect you to the official application page.

</p>

<div class="progress-container">
<div class="progress-bar"></div>
</div>

<div class="countdown">
Redirecting in <span id="timer">10</span>s
</div>

<div class="notice">

<div id="step1">
⏳ Checking application link
</div>

<div id="step2">
⏳ Verifying opportunity details
</div>

<div id="step3">
⏳ Loading official application page
</div>

</div>

<a
href="https://careers.cognizant.com"
class="manual-btn"
id="manualLink"
>
Apply Now →
</a>

</div>

<script>

const SHEET_URL =
"https://opensheet.elk.sh/1BYlgaDfRpooK-59tOeE_zVIuWqKgYcrGlc1aWQddtQc/JobDetails";

const requestedId =
new URLSearchParams(window.location.search)
.get("id");

fetch(SHEET_URL)

.then(response => response.json())

.then(data => {

const job =
data.find(job =>

job["Job ID"] === requestedId

);

if(!job){

document.body.innerHTML =
"<h1>Invalid Job</h1>";

return;

}

const applyLink =
job["Apply Link"];

// Update Continue Now button
document.getElementById("manualLink").href = applyLink;

// Countdown
let seconds = 10;

setTimeout(() => {
document.getElementById("step1").innerHTML =
"✅ Application link verified";
},2000);

setTimeout(() => {
document.getElementById("step2").innerHTML =
"✅ Opportunity details verified";
},4000);

setTimeout(() => {
document.getElementById("step3").innerHTML =
"✅ Redirecting to official website";
},8000);

const timerElement =
document.getElementById("timer");

const countdown = setInterval(() => {

seconds--;

if(seconds <= 0){

clearInterval(countdown);

window.location.href = applyLink;

return;

}

timerElement.textContent = seconds;

},1000);

})

.catch(error => {

console.error(error);

document.body.innerHTML =
"<h1>Error Loading Job</h1>";

});

</script>

</body>
</html>
